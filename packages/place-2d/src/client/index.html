<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Roost — Haunt</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a2e;
      color: #e0e0e0;
      font-family: 'Georgia', serif;
      overflow: hidden;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    #game-container {
      flex: 1;
      position: relative;
      overflow: hidden;
      min-height: 0;
    }
    #chat-container {
      height: 200px;
      min-height: 200px;
      max-height: 200px;
      flex-shrink: 0;
      background: #16213e;
      border-top: 1px solid #0f3460;
      display: flex;
      flex-direction: column;
      font-size: 14px;
    }
    #chat-log {
      flex: 1;
      overflow-y: auto;
      padding: 8px 12px;
      line-height: 1.5;
    }
    #chat-log .msg-resident { color: #e4a672; }
    #chat-log .msg-guest { color: #a8d8ea; }
    #chat-log .msg-system { color: #888; font-style: italic; }
    #chat-log .msg-self { color: #c3e88d; }
    #chat-input-row {
      display: flex;
      flex-shrink: 0;
      border-top: 1px solid #0f3460;
    }
    #chat-input {
      flex: 1;
      padding: 8px 12px;
      background: #1a1a2e;
      border: none;
      color: #e0e0e0;
      font-family: 'Georgia', serif;
      font-size: 14px;
      outline: none;
    }
    #chat-input::placeholder { color: #555; }

    #name-modal {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.85);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }
    #name-modal .modal-box {
      background: #16213e;
      border: 1px solid #0f3460;
      padding: 32px;
      border-radius: 8px;
      text-align: center;
      max-width: 400px;
    }
    #name-modal h2 {
      margin-bottom: 8px;
      font-weight: normal;
      color: #e4a672;
    }
    #name-modal p {
      margin-bottom: 16px;
      color: #888;
      font-size: 14px;
    }
    #name-input {
      padding: 8px 12px;
      background: #1a1a2e;
      border: 1px solid #0f3460;
      color: #e0e0e0;
      font-family: 'Georgia', serif;
      font-size: 16px;
      width: 100%;
      outline: none;
      border-radius: 4px;
    }

    #room-label {
      position: absolute;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 18px;
      color: #e4a672;
      text-shadow: 0 0 10px rgba(0,0,0,0.8);
      pointer-events: none;
      z-index: 10;
    }

    #room-desc {
      position: absolute;
      top: 38px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 12px;
      color: #888;
      text-shadow: 0 0 10px rgba(0,0,0,0.8);
      pointer-events: none;
      z-index: 10;
      max-width: 600px;
      text-align: center;
    }

    #interact-hint {
      position: absolute;
      bottom: 12px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 12px;
      color: #aaa;
      background: rgba(0,0,0,0.6);
      padding: 4px 12px;
      border-radius: 4px;
      pointer-events: none;
      z-index: 10;
      display: none;
    }
  </style>
</head>
<body>
  <div id="game-container">
    <div id="room-label"></div>
    <div id="room-desc"></div>
    <div id="interact-hint">Press E to interact</div>
  </div>
  <div id="chat-container">
    <div id="chat-log"></div>
    <div id="chat-input-row">
      <input id="chat-input" type="text" placeholder="Press Enter to speak..." maxlength="2000" />
    </div>
  </div>

  <div id="name-modal">
    <div class="modal-box">
      <h2>The Roost</h2>
      <p>A place you frequent. A place that remembers.</p>
      <input id="name-input" type="text" placeholder="Your name..." maxlength="50" autofocus />
      <button id="name-submit" style="
        margin-top: 12px;
        padding: 8px 24px;
        background: #0f3460;
        color: #e0e0e0;
        border: 1px solid #3a7ca5;
        border-radius: 4px;
        font-family: 'Georgia', serif;
        font-size: 14px;
        cursor: pointer;
        width: 100%;
      ">Enter</button>
    </div>
  </div>

  <script type="module" src="./main.ts"></script>
</body>
</html>
